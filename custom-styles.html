<script>
function toggleNavMenu() {
  const menu = document.getElementById('nav-menu');
  const list = document.getElementById('slide-list');
  
  if (!menu.classList.contains('open')) {
    list.innerHTML = '';
    const slides = document.querySelectorAll('.reveal .slides > section');

    slides.forEach((slide, index) => {
      const customEl = slide.querySelector('.slide-title');
      const custom = customEl ? customEl.getAttribute('data-title') : null;

      const header = slide.querySelector('h1, h2, h3, h4');

      let title = "Slide " + (index + 1);

      if (custom) title = custom;
      else if (header) title = header.innerText.trim();

      if (index === 0) title = "🏠 Home (Title)";

      const li = document.createElement('li');
      li.innerHTML = `<a href="#/${index}" onclick="toggleNavMenu()">${title}</a>`;
      list.appendChild(li);
    });
    menu.classList.add('open');
  } else {
    menu.classList.remove('open');
  }
}
</script>

<canvas id="annotator"
        style="position:fixed; top:0; left:0; width:100%; height:100%;
               pointer-events:none; z-index: 1000;"></canvas>

<script>
  const c = document.getElementById('annotator');
  const ctx = c.getContext('2d');
  let draw = false;

  function resize() {
    c.width = window.innerWidth;
    c.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  window.addEventListener('mousedown', e => {
    if (e.shiftKey) {
      draw = true;
      ctx.strokeStyle = 'red';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(e.clientX, e.clientY);
    }
  });

  window.addEventListener('mousemove', e => {
    if (draw) {
      ctx.lineTo(e.clientX, e.clientY);
      ctx.stroke();
    }
  });

  window.addEventListener('mouseup', () => draw = false);

  window.addEventListener('keydown', e => {
    if (e.key === 'c') {
      ctx.clearRect(0, 0, c.width, c.height);
    }
  });
</script>

<style>
  .plot-container {
    position: relative;
  }

  .fullscreen-btn {
    position: absolute;
    top: 8px;
    right: 8px;
    z-index: 50;
    background: rgba(255,255,255,0.85);
    border: 1px solid #333;
    padding: 4px 8px;
    font-size: 14px;
    cursor: pointer;
    border-radius: 4px;
  }

  .fullscreen-btn:hover {
    background: #f0f0f0;
  }
</style>

<script>
document.addEventListener('DOMContentLoaded', () => {
  document.querySelectorAll("iframe[data-src*='media/plots/']").forEach(frame => {
    if (frame.parentElement.classList.contains('plot-container')) return;

    const wrapper = document.createElement('div');
    wrapper.className = 'plot-container';
    frame.parentNode.insertBefore(wrapper, frame);
    wrapper.appendChild(frame);

    const btn = document.createElement('button');
    btn.className = 'fullscreen-btn';
    btn.innerText = '⛶ Fullscreen';
    wrapper.appendChild(btn);

    btn.addEventListener('click', () => {
      if (frame.requestFullscreen) frame.requestFullscreen();
      else if (frame.webkitRequestFullscreen) frame.webkitRequestFullscreen();
      else if (frame.msRequestFullscreen) frame.msRequestFullscreen();
    });
  });
});
</script>
